  <circle cx="198" cy="150" r="8" fill="#22c55e"/>
  <circle cx="230" cy="122" r="8" fill="#0e1116" stroke="#22c55e" stroke-width="6"/>
  <circle cx="230" cy="178" r="8" fill="#0e1116" stroke="#22c55e" stroke-width="6"/>

