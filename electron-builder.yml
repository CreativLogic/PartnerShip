appId: com.vinnie.partnership
productName: PartnerShip
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{PLAN.md,README.md}'
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/better-sqlite3/**'
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Vinnie
npmRebuild: true
